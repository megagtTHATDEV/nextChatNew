<!DOCTYPE html>
<html>
<head>
  <title>NextChat (beta)</title>

  <style>
    * {
      margin: 0;
      font-family: Arial;
      box-sizing: border-box;
    }

    body {
      display: flex;
      height: 100vh;
      background: #313338;
      color: white;
    }

    /* LOGIN SCREEN */
    #loginScreen {
      position: fixed;
      inset: 0;
      background: #313338;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 10;
    }

    button {
      padding: 10px 15px;
      background: #5865F2;
      border: none;
      color: white;
      border-radius: 6px;
      cursor: pointer;
    }

    /* SERVER BAR */
    .serverBar {
      width: 72px;
      background: #1e1f22;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 10px 0;
      gap: 10px;
    }

    .serverIcon {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      background: #5865F2;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      font-weight: bold;
    }

    .serverIcon:hover {
      border-radius: 16px;
    }

    /* MAIN CHAT */
    .main {
      flex: 1;
      display: flex;
      flex-direction: column;
    }

    .top {
      height: 50px;
      background: #2b2d31;
      display: flex;
      align-items: center;
      padding: 0 15px;
      font-weight: bold;
    }

    .chat {
      flex: 1;
      padding: 10px;
      overflow-y: auto;
    }

    .input {
      display: flex;
      padding: 10px;
      background: #2b2d31;
    }

    input {
      flex: 1;
      padding: 10px;
      border: none;
      background: #383a40;
      color: white;
      border-radius: 6px;
    }
  </style>
</head>

<body>

<!-- LOGIN -->
<div id="loginScreen">
  <h1>NextChat</h1>
  <p>Discord-style beta</p>
  <button onclick="login()">Login with Google</button>
</div>

<!-- SERVERS -->
<div class="serverBar">
  <div class="serverIcon" onclick="openCreate()">+</div>
  <div class="serverIcon" onclick="openJoin()">🔗</div>
  <div id="servers"></div>
</div>

<!-- CHAT -->
<div class="main">
  <div class="top" id="serverName">No server selected</div>
  <div class="chat" id="chat"></div>

  <div class="input">
    <input id="msg" placeholder="Message..." />
    <button onclick="sendMsg()">Send</button>
  </div>
</div>

<!-- POPUP -->
<div id="popup" style="display:none; position:fixed; top:30%; left:40%; background:#1e1f22; padding:20px;">
  <input id="serverInput" placeholder="Server name">
  <button onclick="createServer()">Create</button>

  <input id="joinInput" placeholder="Server ID">
  <button onclick="joinServer()">Join</button>

  <button onclick="closePopup()">Close</button>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
  getAuth,
  signInWithPopup,
  GoogleAuthProvider,
  onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

import {
  getFirestore,
  doc,
  setDoc,
  updateDoc,
  arrayUnion,
  collection,
  getDocs,
  onSnapshot,
  addDoc,
  serverTimestamp
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

/* FIREBASE CONFIG */
const firebaseConfig = {
  apiKey: "AIzaSyCmuTFq5e9pDKZLQ4RAD61eWQCvnc9N4mo",
  authDomain: "servers-fcc29.firebaseapp.com",
  projectId: "servers-fcc29",
  storageBucket: "servers-fcc29.firebasestorage.app",
  messagingSenderId: "740801059643",
  appId: "1:740801059643:web:aff3348ea0c95ec492b51e"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);
const provider = new GoogleAuthProvider();

let user;
let currentServer = null;

/* LOGIN */
window.login = async function () {
  try {
    const result = await signInWithPopup(auth, provider);
    user = result.user;

    document.getElementById("loginScreen").style.display = "none";
    loadServers();
  } catch (e) {
    alert(e.message);
  }
};

/* AUTH STATE */
onAuthStateChanged(auth, (u) => {
  if (u) {
    user = u;
    document.getElementById("loginScreen").style.display = "none";
    loadServers();
  } else {
    document.getElementById("loginScreen").style.display = "flex";
  }
});

/* CREATE SERVER */
window.createServer = async function () {
  if (!user) return alert("Login first");

  const id = Math.random().toString(36).substring(2, 10);

  await setDoc(doc(db, "servers", id), {
    name: document.getElementById("serverInput").value,
    members: [user.uid]
  });

  closePopup();
  loadServers();
};

/* JOIN SERVER + BOT */
window.joinServer = async function () {
  const id = document.getElementById("joinInput").value;

  await updateDoc(doc(db, "servers", id), {
    members: arrayUnion(user.uid)
  });

  await addDoc(collection(db, "servers", id, "messages"), {
    text: `🤖 Welcome ${user.displayName}`,
    user: "NextBot",
    type: "text",
    time: serverTimestamp()
  });

  closePopup();
  loadServers();
};

/* LOAD SERVERS */
async function loadServers() {
  const box = document.getElementById("servers");
  box.innerHTML = "";

  const snap = await getDocs(collection(db, "servers"));

  snap.forEach((d) => {
    const data = d.data();

    if (data.members.includes(user.uid)) {
      const div = document.createElement("div");
      div.className = "serverIcon";
      div.innerText = data.name[0];

      div.onclick = () => {
        currentServer = d.id;
        document.getElementById("serverName").innerText = data.name;
        listenMessages(d.id);
      };

      box.appendChild(div);
    }
  });
}

/* REALTIME CHAT */
function listenMessages(id) {
  const chat = document.getElementById("chat");
  chat.innerHTML = "";

  onSnapshot(collection(db, "servers", id, "messages"), (snap) => {
    chat.innerHTML = "";

    snap.forEach((m) => {
      const d = m.data();

      const div = document.createElement("div");
      div.innerHTML = `<b>${d.user}:</b> ${d.text}`;

      chat.appendChild(div);
    });
  });
}

/* SEND MESSAGE */
window.sendMsg = async function () {
  if (!currentServer) return alert("Select server first");

  await addDoc(collection(db, "servers", currentServer, "messages"), {
    text: document.getElementById("msg").value,
    user: user.displayName,
    type: "text",
    time: serverTimestamp()
  });

  document.getElementById("msg").value = "";
};

/* POPUPS */
window.openCreate = () => document.getElementById("popup").style.display = "block";
window.openJoin = () => document.getElementById("popup").style.display = "block";
window.closePopup = () => document.getElementById("popup").style.display = "none";

</script>

</body>
</html>
